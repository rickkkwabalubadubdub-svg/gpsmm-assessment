<script>
/* Global Professional Services Maturity Model — Self-Assessment
   Single-file, client-side app. No data leaves the browser. */

const DATA = JSON.parse(document.getElementById('gcmm-data').textContent);
const LEVEL_COLOR = {1:'#DD7A45',2:'#E8BD4A',3:'#8FD06A',4:'#47D45A'};
const answers = {};
const VALID_KEYS = new Set();
DATA.domains.forEach(d=>d.questions.forEach(q=>VALID_KEYS.add(d.id+'-'+q.qnum)));
let view = 'intro';
let domainFilter = 'all'; // 'all' | 'unanswered' | 'answered'

/* ---------- localStorage autosave (F-01) ---------- */
const LS_KEY = 'gcmm_autosave_v1';
const LS_NOTICE_KEY = 'gcmm_autosave_notice_shown';
function autosave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({savedAt:new Date().toISOString(), answers})); } catch(e){}
}
function autoload(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || typeof data.answers !== 'object') return false;
    let count = 0;
    Object.entries(data.answers).forEach(([k,v])=>{
      if(VALID_KEYS.has(k) && Number.isInteger(v) && v>=0 && v<=4){ answers[k]=v; count++; }
    });
    return count > 0;
  } catch(e){ return false; }
}
function showAutosaveNotice(){
  if(localStorage.getItem(LS_NOTICE_KEY)) return;
  const banner = document.createElement('div');
  banner.id = 'autosave-notice';
  banner.innerHTML = '<span>✓ Autosave is <b>on</b> — your answers are saved in this browser automatically. <a href="#" class="notice-close" style="color:var(--green)">Got it</a></span>';
  document.body.appendChild(banner);
  banner.querySelector('.notice-close').addEventListener('click', e=>{
    e.preventDefault(); localStorage.setItem(LS_NOTICE_KEY,'1'); banner.remove();
  });
}
// hadAutosave is set after authentication by the auth layer
let hadAutosave = false;

// Warn before closing if unsaved work
window.addEventListener('beforeunload', e=>{
  if(Object.keys(answers).length > 0){ e.preventDefault(); e.returnValue=''; }
});

/* ---------- helpers ---------- */
function qKey(domainId, qnum){ return domainId + '-' + qnum; }

function escapeHtml(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function domainStats(domain){
  let raw=0, answered=0;
  domain.questions.forEach(q=>{
    const v = answers[qKey(domain.id,q.qnum)];
    if(v!==undefined){ raw+=v; answered++; }
  });
  const pct = domain.maxPoints ? (raw/domain.maxPoints*100) : 0;
  return {raw, max:domain.maxPoints, pct, answered, total:domain.count};
}

function overallStats(){
  let raw=0, answered=0, total=0;
  DATA.domains.forEach(d=>{
    const s=domainStats(d);
    raw+=s.raw; answered+=s.answered; total+=s.total;
  });
  return {raw, max:DATA.meta.totalPoints, pct: raw/DATA.meta.totalPoints*100, answered, total};
}

function levelFor(pct){
  const levels=DATA.meta.maturityLevels;
  for(const l of levels){ if(pct>=l.min && pct<l.max) return l; }
  return levels[levels.length-1];
}

/* ---------- gauges (SVG) ---------- */
function polarToCartesian(cx,cy,r,angleDeg){
  const a=(angleDeg-90)*Math.PI/180;
  return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
}
function arcPath(cx,cy,r,startDeg,endDeg){
  if(endDeg<=startDeg) return '';
  if(endDeg-startDeg>=359.99) endDeg=startDeg+359.99;
  const start=polarToCartesian(cx,cy,r,startDeg);
  const end=polarToCartesian(cx,cy,r,endDeg);
  const large=(endDeg-startDeg)<=180?0:1;
  return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
}
function maturityGauge(pct,size){
  const r=size/2-7, cx=size/2, cy=size/2;
  let svg='';
  DATA.meta.maturityLevels.forEach(b=>{
    const a0=Math.min(b.min,100)*3.6, a1=Math.min(b.max,100)*3.6;
    svg+=`<path d="${arcPath(cx,cy,r,a0,a1)}" fill="none" stroke="${LEVEL_COLOR[b.level]}" stroke-width="9" stroke-linecap="butt"/>`;
  });
  const p=Math.max(0,Math.min(pct,100));
  const m=polarToCartesian(cx,cy,r,p*3.6);
  svg+=`<circle cx="${m.x.toFixed(2)}" cy="${m.y.toFixed(2)}" r="6.5" fill="#fff" stroke="#002060" stroke-width="3"/>`;
  const lvl=levelFor(pct);
  const centerSize = size<=90 ? 12 : 22;
  return `<div class="gauge-wrap"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${svg}</svg>
    <div class="gauge-center"><span class="pct" style="font-size:${centerSize}px">${Math.round(p)}%</span><span class="lvl">L${lvl.level} · ${lvl.label}</span></div></div>`;
}
function ringSVG(pct,size){
  const r=size/2-3, c=2*Math.PI*r;
  const dash=c*Math.max(0,Math.min(pct,100))/100;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#47D45A" stroke-width="3" stroke-dasharray="${c.toFixed(2)} ${c.toFixed(2)}" stroke-dashoffset="${(c-dash).toFixed(2)}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
  </svg>`;
}

/* ---------- rail ---------- */
function renderRail(){
  const rail=document.getElementById('rail');
  let html=`<div class="rail-brand"><span class="tag"> ICAI · 2026</span><h1>Global Professional Services Maturity Model</h1></div><div class="rail-nav">`;
  DATA.domains.forEach(d=>{
    const s=domainStats(d);
    const pct = s.total ? (s.answered/s.total*100) : 0;
    html+=`<button class="rail-item ${view===d.id?'active':''}" data-view="${d.id}">
      <span class="ring">${ringSVG(pct,30)}</span>
      <span class="lbl"><b>${d.id} · ${d.name}</b><small>${s.answered}/${s.total} answered</small></span>
    </button>`;
  });
  const o=overallStats();
  const opct=o.total? (o.answered/o.total*100):0;
  html+=`</div><div class="rail-results"><button class="rail-item ${view==='results'?'active':''}" data-view="results">
      <span class="ring">${ringSVG(opct,30)}</span>
      <span class="lbl"><b>Results &amp; Roadmap</b><small>${o.answered}/${o.total} overall</small></span>
    </button></div>
  <div class="rail-foot">Answers <b>autosave</b> in this browser and sync to your account. Use <b>Save progress</b> on the Results page to export a portable JSON backup.</div>`;
  rail.innerHTML=html;
  rail.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
    view=b.dataset.view; rail.classList.remove('open'); render();
  }));
}

/* ---------- topbar ---------- */
function renderTopbar(){
  const topbar=document.getElementById('topbar');
  if(view==='intro'){ topbar.style.display='none'; topbar.innerHTML=''; return; }
  topbar.style.display='block';
  if(view==='results'){
    const o=overallStats();
    topbar.innerHTML=`<div class="topbar-row"><div><h2>Results &amp; Improvement Roadmap</h2>
      <div class="sub">Based on ${o.answered} of ${o.total} questions answered across all 6 domains</div></div></div>`;
    return;
  }
  const domain=DATA.domains.find(d=>d.id===view);
  const s=domainStats(domain);
  const pct=s.total?(s.answered/s.total*100):0;
  const unans = s.total - s.answered;
  let pills='';
  domain.sections.forEach((sec,i)=>{
    const secUnanswered = sec.questions.filter(qn=>answers[qKey(domain.id,qn)]===undefined).length;
    const dimCls = domainFilter==='unanswered' && secUnanswered===0 ? ' dim' : '';
    pills+=`<a class="pill${dimCls}" href="#sec-${i}" data-sec="${i}">${escapeHtml(sec.name)}<span class="sr-only"> (${secUnanswered} remaining)</span></a>`;
  });
  const f = domainFilter;
  topbar.innerHTML=`<div class="topbar-row">
    <div><h2>${domain.id} · ${domain.name}</h2><div class="sub">${s.answered} of ${s.total} questions answered · ${domain.maxPoints} pts max · ${domain.priority} priority</div></div>
    <div class="progress-wrap"><div class="progress-label">${Math.round(pct)}% complete</div><div class="progress-bar"><i style="width:${pct}%"></i></div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-tab${f==='all'?' active':''}" data-filter="all">All <span class="tab-count">(${s.total})</span></button>
    <button class="filter-tab${f==='unanswered'?' active':''}" data-filter="unanswered">Unanswered <span class="tab-count">(${unans})</span></button>
    <button class="filter-tab${f==='answered'?' active':''}" data-filter="answered">Answered <span class="tab-count">(${s.answered})</span></button>
  </div>
  <div class="section-pills">${pills}</div>`;
  topbar.querySelectorAll('[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{
    domainFilter=btn.dataset.filter; renderTopbar(); applyFilter();
  }));
  /* Section pill active highlight */
  topbar.querySelectorAll('.section-pills .pill[data-sec]').forEach(pill=>{
    pill.addEventListener('click',()=>{
      topbar.querySelectorAll('.section-pills .pill').forEach(p=>p.classList.remove('active'));
      pill.classList.add('active');
    });
  });
}

/* ---------- intro ---------- */
function renderIntro(){
  const hasProgress = Object.keys(answers).length>0;
  let html=`<div class="hero">
    <span class="tag">ICAI · Global Trade &amp; Services Committee · 2026</span>
    <h1>Global Professional Services Maturity Model</h1>
    <p>A self-assessment across <b>${DATA.domains.length} domains</b> and <b>${DATA.meta.totalQuestions} questions</b> (${DATA.meta.totalPoints} points total), designed to benchmark your entity's readiness to establish and operate a Global Professional Services Centre. Answer each question on a 0–4 scale; for any 0, 1 or 2, you'll get a step-by-step improvement roadmap. Your answers autosave in this browser and are securely stored to your account.</p>
    <div class="hero-cta">
      <button class="btn primary" data-view="D1">${hasProgress?'Continue assessment':'Start assessment'} →</button>
      ${hasProgress?'<button class="btn ghost" data-view="results">View results</button>':''}
      <button class="btn ghost load-progress-trigger">⬆ Load saved progress</button>
      <input type="file" class="load-progress-input" accept="application/json" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none" aria-hidden="true" tabindex="-1">
    </div>
  </div>`;

  html+='<div class="domain-grid">';
  DATA.domains.forEach(d=>{
    html+=`<div class="dcard">
      <div class="id">${d.id} · ${d.priority} priority</div>
      <h3>${d.name}</h3>
      <p>${escapeHtml(d.description)}</p>
      <div class="meta"><span>${d.count} questions</span><span>${d.maxPoints} pts</span></div>
    </div>`;
  });
  html+='</div>';

  html+='<div class="legend"><div><h4>Scoring Scale (per question)</h4>';
  DATA.meta.scoringScale.forEach(s=>{
    html+=`<div class="scale-row"><span class="scale-num">${s.value}</span><div><b>${escapeHtml(s.label)}</b><span>${escapeHtml(s.description)}</span></div></div>`;
  });
  html+='</div><div><h4>Maturity Levels (overall %)</h4>';
  const CHIP_DARK = {1:true, 2:true, 3:false, 4:false};
  DATA.meta.maturityLevels.forEach(l=>{
    const range = l.level===4 ? `≥${l.min}%` : `${l.min}–<${l.max}%`;
    const dk = CHIP_DARK[l.level] ? ' dark' : '';
    html+=`<div class="level-row"><span class="level-chip${dk}" style="background:${LEVEL_COLOR[l.level]}">${range}</span><div><b>Level ${l.level} — ${escapeHtml(l.label)}</b><span>${escapeHtml(l.description)}</span></div></div>`;
  });
  html+='</div></div>';
  return html;
}

/* ---------- domain / questions ---------- */
function questionCard(domain,q,ans){
  let opts='';
  for(let v=0;v<=4;v++){
    const sel = ans===v ? 'selected' : '';
    opts+=`<label class="option ${sel}">
      <input type="radio" name="${qKey(domain.id,q.qnum)}" value="${v}" ${ans===v?'checked':''}>
      <span class="opt-tag">${v} · ${escapeHtml(DATA.meta.scoringScale[v].label)}</span>
      <span class="opt-desc">${escapeHtml(q.criteria[v])}</span>
    </label>`;
  }
  return `<div class="question ${ans!==undefined?'answered':''}" id="card-${qKey(domain.id,q.qnum)}" data-qkey="${qKey(domain.id,q.qnum)}">
    <div class="q-head"><span class="q-num">Q${q.qnum}</span><span class="q-title">${escapeHtml(q.title)}</span><span class="q-pts">${q.points} pts</span></div>
    <div class="q-text">${escapeHtml(q.question)}</div>
    <fieldset class="options">
      <legend class="sr-only">Q${q.qnum}. ${escapeHtml(q.title)} — select a score from 0 to 4</legend>
      ${opts}
    </fieldset>
  </div>`;
}

function renderDomain(domain){
  let html=`<div class="domain-head"><span class="tag">${domain.priority} priority · ${domain.maxPoints} points · ${domain.count} questions</span>
    <h1>${domain.id} · ${domain.name}</h1><p>${escapeHtml(domain.about)}</p></div>`;
  domain.sections.forEach((sec,i)=>{
    html+=`<div class="section-block" id="sec-${i}"><h3 class="section-title">${escapeHtml(sec.name)}</h3>`;
    sec.questions.forEach(qnum=>{
      const q=domain.questions.find(x=>x.qnum===qnum);
      const ans=answers[qKey(domain.id,qnum)];
      html+=questionCard(domain,q,ans);
    });
    html+='</div>';
  });
  const idx=DATA.domains.findIndex(d=>d.id===domain.id);
  const prev=idx>0?DATA.domains[idx-1]:null;
  const next=idx<DATA.domains.length-1?DATA.domains[idx+1]:null;
  html+=`<div class="domain-foot">
    <div>${prev?`<button class="btn ghost" data-view="${prev.id}">← ${prev.id} · ${prev.name}</button>`:'<span></span>'}</div>
    <div>${next?`<button class="btn primary" data-view="${next.id}">${next.id} · ${next.name} →</button>`:`<button class="btn primary" data-view="results">View results &amp; roadmap →</button>`}</div>
  </div>`;
  return html;
}

/* ---------- results ---------- */
function renderResults(){
  const o=overallStats();
  const lvl=levelFor(o.pct);
  const provisionalBadge = o.answered<o.total ? '<span class="provisional-badge">PROVISIONAL</span> ' : '';
  let html=`<div class="results-summary" role="region" aria-label="Overall maturity result">
    ${maturityGauge(o.pct,150)}
    <div class="text">
      <h2>${o.answered<o.total?'<span class=\'provisional-badge\'>PROVISIONAL</span> ':''}Overall Maturity: ${o.pct.toFixed(1)}% — Level ${lvl.level} · ${lvl.label}</h2>
      <p>${escapeHtml(lvl.description)}</p>
      <div class="completeness">${o.raw} / ${o.max} points &nbsp;·&nbsp; ${o.answered} / ${o.total} questions answered</div>
    </div>
  </div>`;
  if(o.answered<o.total){
    html+=`<div class="empty-note" style="margin-bottom:24px">Scores reflect <b>${o.answered} of ${o.total}</b> questions answered so far — unanswered questions count as 0 toward the score. Complete the remaining sections for an accurate maturity reading.</div>`;
  }
  html+='<div class="domain-results">';
  DATA.domains.forEach(d=>{
    const s=domainStats(d);
    const l=levelFor(s.pct);
    html+=`<div class="dresult">
      <div class="id">${d.id} · ${d.priority} priority</div>
      <h4>${escapeHtml(d.name)}</h4>
      ${maturityGauge(s.pct,90)}
      <div class="score-line">${s.raw} / ${s.max} pts</div>
      <div class="level-tag" style="background:${LEVEL_COLOR[l.level]};color:${l.level<=2?'#002060':'#fff'}">L${l.level} · ${l.label}</div>
    </div>`;
  });
  html+='</div>';

  html+=`<div class="roadmap-head" role="region" aria-labelledby="roadmap-heading"><div><h2 id="roadmap-heading">Improvement Roadmap</h2>
    <p>Every question scored 0 (Not in Place), 1 (Awareness) or 2 (Partial) comes with a step-by-step path toward Level 4 — most have 4 steps, a few have 5. Grouped by domain — click to expand.</p></div></div>`;

  const SCORE_BADGE_COLOR = {0:LEVEL_COLOR[1], 1:LEVEL_COLOR[1], 2:LEVEL_COLOR[2]};
  let any=false;
  DATA.domains.forEach(d=>{
    const items=[];
    d.questions.forEach(q=>{
      const v=answers[qKey(d.id,q.qnum)];
      if(v===0||v===1||v===2) items.push({q,v});
    });
    if(items.length===0) return;
    any=true;
    html+=`<details class="rd-domain"><summary><span>${d.id} · ${escapeHtml(d.name)}</span><span class="count">${items.length} area${items.length>1?'s':''} for focus</span></summary><div class="rd-body">`;
    items.forEach(({q,v})=>{
      const stepCount = q.guidance[5] !== undefined ? 5 : 4;
      html+=`<div class="rd-item">
        <div class="rd-item-head"><span class="score-badge" style="background:${SCORE_BADGE_COLOR[v]}">Scored ${v}</span><h5>Q${q.qnum} · ${escapeHtml(q.title)}</h5></div>
        <div class="rd-steps">`;
      for(let s=1;s<=stepCount;s++){
        html+=`<div class="rd-step"><b>Step ${s}</b><span>${escapeHtml(q.guidance[s])}</span></div>`;
      }
      html+='</div></div>';
    });
    html+='</div></details>';
  });
  if(!any){
    html+=`<div class="empty-note">No improvement items yet — score a question 0, 1 or 2 to see its step-by-step roadmap here, or complete the assessment to see your full roadmap.</div>`;
  }

  html+=`<div class="toolbar">
    <button class="btn primary print-btn">🖨 Print / Save as PDF</button>
    <button class="btn ghost save-progress-btn">⬇ Save progress (JSON)</button>
    <button class="btn ghost load-progress-trigger">⬆ Load progress</button>
    <input type="file" class="load-progress-input" accept="application/json" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none" aria-hidden="true" tabindex="-1">
    <button class="btn ghost reset-btn">↺ Reset all answers</button>
  </div>`;
  return html;
}

/* ---------- save / load / reset ---------- */
function saveProgress(){
  const payload={tool:'GCMM Self-Assessment',version:1,savedAt:new Date().toISOString(),answers};
  const blob=new Blob([JSON.stringify(payload,null,1)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='gcmm-assessment-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function loadProgress(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data || typeof data.answers!=='object' || data.answers===null){
        alert('This file does not look like a saved GCMM assessment.');
        return;
      }
      const cleaned={};
      let accepted=0, rejected=0;
      Object.entries(data.answers).forEach(([key,raw])=>{
        if(!VALID_KEYS.has(key)){ rejected++; return; }
        const num=Number(raw);
        if(!Number.isInteger(num) || num<0 || num>4){ rejected++; return; }
        cleaned[key]=num;
        accepted++;
      });
      Object.keys(answers).forEach(k=>delete answers[k]);
      Object.assign(answers,cleaned);
      autosave();
      view='results';
      render();
      let msg=`Progress loaded: ${accepted} answer(s) restored.`;
      if(rejected>0) msg+=`\n${rejected} entr${rejected===1?'y':'ies'} were ignored (unrecognised question or invalid score).`;
      alert(msg);
    }catch(err){
      alert('Could not read this file: '+err.message);
    }
  };
  reader.readAsText(file);
}

/* ---------- render orchestration ---------- */
/* ---------- question filter (F-10) ---------- */
function applyFilter(){
  if(!view || view==='intro' || view==='results') return;
  const domain = DATA.domains.find(d=>d.id===view);
  if(!domain) return;
  document.querySelectorAll('.question').forEach(card=>{
    const key = card.id.replace('card-','');
    const isAnswered = answers[key] !== undefined;
    let show = true;
    if(domainFilter==='unanswered') show = !isAnswered;
    if(domainFilter==='answered') show = isAnswered;
    card.classList.toggle('hidden-by-filter', !show);
  });
  // Hide section blocks that have no visible questions
  document.querySelectorAll('.section-block').forEach(sec=>{
    const visible = sec.querySelectorAll('.question:not(.hidden-by-filter)').length;
    sec.classList.toggle('hidden-by-filter', visible===0);
    // Update remaining count on section title
    const titleEl = sec.querySelector('.section-title');
    if(titleEl){
      const allQs = sec.querySelectorAll('.question').length;
      const answeredQs = sec.querySelectorAll('.question.answered').length;
      const rem = allQs - answeredQs;
      let remEl = titleEl.querySelector('.section-remaining');
      if(!remEl){ remEl = document.createElement('span'); remEl.className='section-remaining'; titleEl.appendChild(remEl); }
      remEl.textContent = rem > 0 ? `${rem} remaining` : '✓ done';
    }
  });
}

function attachContentHandlers(){
  const content=document.getElementById('content');
  content.querySelectorAll('input[type=radio]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      answers[e.target.name]=parseInt(e.target.value,10);
      const card=e.target.closest('.question');
      card.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      e.target.closest('.option').classList.add('selected');
      card.classList.add('answered');
      autosave();
      applyFilter();
      renderRail();
      renderTopbar();
    });
  });
  content.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
    view=b.dataset.view; render();
  }));
  content.querySelectorAll('.print-btn').forEach(b=>b.addEventListener('click',()=>{
    const o=overallStats();
    if(o.answered<o.total){
      if(!confirm(`Only ${o.answered} of ${o.total} questions have been answered.\n\nThis PDF will be marked PROVISIONAL.\n\nProceed?`)) return;
    }
    // Force all roadmap details open for print
    document.querySelectorAll('.rd-domain').forEach(d=>d.setAttribute('open',''));
    window.print();
    // Collapse them back after brief delay
    setTimeout(()=>document.querySelectorAll('.rd-domain').forEach(d=>d.removeAttribute('open')),500);
  }));
  content.querySelectorAll('.save-progress-btn').forEach(b=>b.addEventListener('click',saveProgress));
  content.querySelectorAll('.load-progress-input').forEach(inp=>inp.addEventListener('change',loadProgress));
  content.querySelectorAll('.load-progress-trigger').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const inp = btn.nextElementSibling;
      if(inp && inp.type==='file') inp.click();
    });
  });
  content.querySelectorAll('.reset-btn').forEach(b=>b.addEventListener('click',()=>{
    if(confirm('Clear all answers? This cannot be undone unless you have saved a progress file.')){
      Object.keys(answers).forEach(k=>delete answers[k]);
      try{ localStorage.removeItem(LS_KEY); } catch(e){}
      view='intro';
      render();
    }
  }));
}

function render(){
  // Reset filter when switching domain views
  domainFilter='all';
  renderRail();
  renderTopbar();
  const content=document.getElementById('content');
  if(view==='intro') content.innerHTML=renderIntro();
  else if(view==='results') content.innerHTML=renderResults();
  else content.innerHTML=renderDomain(DATA.domains.find(d=>d.id===view));
  attachContentHandlers();
  applyFilter();
  window.scrollTo(0,0);
}

const menuToggleBtn = document.getElementById('menuToggle');
const railEl = document.getElementById('rail');
function openDrawer(){ railEl.classList.add('open'); menuToggleBtn.setAttribute('aria-expanded','true'); menuToggleBtn.focus && null; }
function closeDrawer(){ railEl.classList.remove('open'); menuToggleBtn.setAttribute('aria-expanded','false'); }
menuToggleBtn.setAttribute('aria-expanded','false');
menuToggleBtn.setAttribute('aria-controls','rail');
menuToggleBtn.setAttribute('aria-label','Open navigation menu');
railEl.setAttribute('role','navigation');
railEl.setAttribute('aria-label','Domain navigation');
menuToggleBtn.addEventListener('click',()=>{ railEl.classList.contains('open') ? closeDrawer() : openDrawer(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && railEl.classList.contains('open')) closeDrawer(); });
// Close drawer on outside click
document.addEventListener('click',e=>{ if(railEl.classList.contains('open') && !railEl.contains(e.target) && e.target!==menuToggleBtn) closeDrawer(); });

// render() is called by the auth layer after the user logs in

</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- qrcode library replaced with server-side image API (more reliable) -->

<script>
/* ================================================================
   STEP 1 — Paste your GitHub Pages URL here after hosting
   ================================================================
   Format: "https://YOURUSERNAME.github.io/REPONAME/GPSMM_SelfAssessment_WebApp.html"
   Once set, the QR code on the login screen will point to this URL.
   Leave the placeholder value and the QR code will be hidden.
*/
const APP_URL = "https://rickkkwabalubadubdub-svg.github.io/gpsmm-assessment/GPSMM_SelfAssessment_WebApp.html";

/* ================================================================
   STEP 2 — Firebase Firestore (open-source compatible database)
   ================================================================
   Stores every user's answers, scores, and improvement suggestions.
   Setup: https://console.firebase.google.com/
   1. Create a project → Build → Firestore Database → Create database
   2. Project Settings → General → Add Web App → copy the config below
   Leave as-is to run in localStorage-only mode (no cloud database).
*/
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDWNGvRGhg0hKfY7K4Qd6HxVLfPw3xw-pU",
  authDomain:        "gpsmm-icai.firebaseapp.com",
  projectId:         "gpsmm-icai",
  storageBucket:     "gpsmm-icai.firebasestorage.app",
  messagingSenderId: "442463882875",
  appId:             "1:442463882875:web:4aad192a5112bed0281cde"
};

const DB_CONFIGURED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY_HERE";

/* ================================================================
   STEP 3 — EmailJS (login notifications to Global@icai.in)
   ================================================================
   Every login triggers an email to Global@icai.in with the user's
   email address, membership number, and timestamp.

   Setup (free — 200 emails/month):
   1. Create account at https://www.emailjs.com/
   2. Add Email Service: Email Services → Add Service → Gmail (or SMTP)
      • Copy the Service ID below
   3. Create Template: Email Templates → Create New Template
      • Subject:  New GPSMM Login — {{user_email}}
      • Body:     Email: {{user_email}}\nMembership: {{membership_no}}\nTime: {{login_time}}
      • "To Email" field in template settings: Global@icai.in
      • Copy the Template ID below
   4. Account → General → Public Key → copy below
*/
const EMAILJS_CONFIG = {
  publicKey:  "YOUR_EMAILJS_PUBLIC_KEY",   // e.g. "abc123XYZ..."
  serviceId:  "YOUR_SERVICE_ID",           // e.g. "service_xxxxxx"
  templateId: "YOUR_TEMPLATE_ID"           // e.g. "template_xxxxxx"
};

const EMAIL_CONFIGURED = EMAILJS_CONFIG.publicKey !== "YOUR_EMAILJS_PUBLIC_KEY";

if (EMAIL_CONFIGURED && typeof emailjs !== 'undefined') {
  emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey });
}

function notifyAdminLogin() {
  if (!EMAIL_CONFIGURED || typeof emailjs === 'undefined' || !currentUser) return;
  emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
    user_email:    currentUser.email,
    membership_no: currentUser.membershipNumber,
    login_time:    new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' }) + ' IST'
  }).then(() => console.log('[GPSMM] Admin notified via EmailJS'))
    .catch(e  => console.warn('[GPSMM] EmailJS send error:', e));
}

/* ================================================================
   Auth state
   ================================================================ */
let currentUser = null;  // { email, membershipNumber }
let firestoreDb = null;  // firebase.firestore() instance

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleAuth() {
  const email      = (document.getElementById('auth-email').value || '').trim();
  const membership = (document.getElementById('auth-membership').value || '').trim();
  document.getElementById('auth-error').style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showAuthError('Please enter a valid email address.'); return;
  }
  if (!/^\d{6}$/.test(membership)) {
    showAuthError('CA Membership Number must be exactly 6 digits (numbers only).'); return;
  }

  const btn = document.getElementById('auth-submit');
  btn.disabled = true;
  btn.textContent = 'Please wait…';

  currentUser = { email, membershipNumber: membership };
  try { sessionStorage.setItem('gpsmm_auth', JSON.stringify(currentUser)); } catch(e) {}

  if (DB_CONFIGURED) {
    await initFirestoreDB();
    hadAutosave = autoload();
    await loadFromFirestoreForUser();
  } else {
    hadAutosave = autoload();
  }

  revealMainApp();
  btn.disabled = false;
  btn.textContent = 'Access Assessment →';
}

function revealMainApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  render();
  showAutosaveNotice();
  notifyAdminLogin();
  /* Write a login record immediately so we can confirm Firestore is working */
  if (firestoreDb && currentUser) {
    firestoreDb.collection('assessments').doc(getDocId()).set({
      email:            currentUser.email,
      membershipNumber: currentUser.membershipNumber,
      lastLogin:        new Date().toISOString()
    }, { merge: true })
    .then(() => console.log('[GPSMM] Login recorded in Firestore for', getDocId()))
    .catch(e  => console.warn('[GPSMM] Firestore login-record error:', e));
  }
}

/* ================================================================
   Firestore
   ================================================================ */
async function initFirestoreDB() {
  if (!DB_CONFIGURED || typeof firebase === 'undefined') return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    firestoreDb = firebase.firestore();
  } catch(e) { console.warn('[GPSMM] Firebase init error:', e); }
}

function getDocId() {
  if (!currentUser) return null;
  const safeEmail = currentUser.email.replace(/[.#$\[\]\/]/g, '_');
  return safeEmail + '__' + currentUser.membershipNumber;
}

async function loadFromFirestoreForUser() {
  if (!firestoreDb || !currentUser) return;
  try {
    const snap = await firestoreDb.collection('assessments').doc(getDocId()).get();
    if (snap.exists) {
      const data = snap.data();
      if (data && data.answers && typeof data.answers === 'object') {
        Object.entries(data.answers).forEach(([k, v]) => {
          if (VALID_KEYS.has(k) && Number.isInteger(v) && v >= 0 && v <= 4) {
            answers[k] = v;
          }
        });
      }
    }
  } catch(e) { console.warn('[GPSMM] Firestore load error:', e); }
}

let _fsSaveTimer = null;
function saveToFirestore() {
  if (!firestoreDb || !currentUser) return;
  clearTimeout(_fsSaveTimer);
  _fsSaveTimer = setTimeout(async () => {
    try {
      const o   = overallStats();
      const lvl = levelFor(o.pct);

      const suggestions = [];
      DATA.domains.forEach(d => {
        d.questions.forEach(q => {
          const v = answers[qKey(d.id, q.qnum)];
          if (v === 0 || v === 1 || v === 2) {
            const steps = [];
            const stepCount = q.guidance[5] !== undefined ? 5 : 4;
            for (let s = 1; s <= stepCount; s++) steps.push('Step ' + s + ': ' + q.guidance[s]);
            suggestions.push({
              domain:   d.id + ' – ' + d.name,
              question: 'Q' + q.qnum + ': ' + q.title,
              score:    v,
              guidance: steps
            });
          }
        });
      });

      await firestoreDb.collection('assessments').doc(getDocId()).set({
        email:            currentUser.email,
        membershipNumber: currentUser.membershipNumber,
        lastUpdated:      new Date().toISOString(),
        answers:          Object.assign({}, answers),
        overallScore:     parseFloat(o.pct.toFixed(1)),
        maturityLevel:    'Level ' + lvl.level + ' – ' + lvl.label,
        answeredCount:    o.answered,
        totalQuestions:   o.total,
        suggestions
      }, { merge: true });
      console.log('[GPSMM] Firestore save OK — doc:', getDocId(), '| answers:', o.answered + '/' + o.total);
    } catch(e) { console.warn('[GPSMM] Firestore save error:', e); }
  }, 2500);
}

/* Extend the base autosave to also sync with Firestore */
(function patchAutosave() {
  const _orig = autosave;
  autosave = function () { _orig(); saveToFirestore(); };
})();

/* ================================================================
   QR Code — uses qrserver.com image API, no JS library needed
   ================================================================ */
function generateQRCode() {
  const img         = document.getElementById('qr-img');
  const placeholder = document.getElementById('qr-placeholder');
  const configured  = typeof APP_URL !== 'undefined' &&
                      APP_URL &&
                      APP_URL !== 'PASTE_YOUR_GITHUB_PAGES_URL_HERE';

  if (!configured) {
    if (img)         img.style.display = 'none';
    if (placeholder) placeholder.style.display = 'flex';
    return;
  }

  if (placeholder) placeholder.style.display = 'none';

  if (img) {
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&color=002060&bgcolor=ffffff&margin=10&data='
              + encodeURIComponent(APP_URL);
    img.style.display = '';
    img.onerror = function() {
      img.style.display = 'none';
      if (placeholder) {
        placeholder.textContent = 'QR code unavailable — check internet connection';
        placeholder.style.display = 'flex';
      }
    };
  }
}

/* ================================================================
   Bootstrap
   ================================================================ */
(function bootstrap() {
  generateQRCode();

  /* Check for an existing session */
  try {
    const stored = JSON.parse(sessionStorage.getItem('gpsmm_auth') || 'null');
    if (stored && stored.email && stored.membershipNumber) {
      currentUser = stored;
      if (DB_CONFIGURED) {
        initFirestoreDB().then(() => {
          hadAutosave = autoload();
          return loadFromFirestoreForUser();
        }).then(() => revealMainApp());
      } else {
        hadAutosave = autoload();
        revealMainApp();
      }
      return;
    }
  } catch(e) {}

  /* Wire up the auth form */
  document.getElementById('auth-submit').addEventListener('click', handleAuth);
  ['auth-email', 'auth-membership'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', e => {
      if (e.key === 'Enter') handleAuth();
    });
  });

  /* Strip non-digits from membership field */
  document.getElementById('auth-membership').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
  });
})();
</script>
