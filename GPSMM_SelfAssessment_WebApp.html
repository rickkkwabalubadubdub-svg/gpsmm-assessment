<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Professional Services Maturity Model — Self-Assessment</title>
<style>
:root{
  --navy:#002060;
  --navy-2:#1B3E8C;
  --navy-soft:#E7ECF8;
  --green:#47D45A;
  --green-soft:#E2F8E6;
  --l1:#DD7A45;
  --l2:#E8BD4A;
  --l3:#8FD06A;
  --l4:#47D45A;
  --bg:#F4F6FB;
  --surface:#FFFFFF;
  --ink:#10172A;
  --ink-soft:#5B6477;
  --line:#E3E7F0;
  --radius:12px;
  --green-text:#1A7A30;
  --font-d:-apple-system,'Segoe UI',ui-sans-serif,'Helvetica Neue',Arial,sans-serif;
  --font-b:-apple-system,'Segoe UI',system-ui,Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-m:ui-monospace,'SF Mono','Cascadia Code','Roboto Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font-b);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55}
h1,h2,h3,h4{font-family:var(--font-d);margin:0;letter-spacing:-0.01em}
button{font-family:inherit;cursor:pointer}
a{color:var(--navy-2)}

/* ---------- Shell layout ---------- */
.shell{display:flex;min-height:100vh}
.rail{width:268px;flex:none;background:var(--navy);color:#fff;display:flex;flex-direction:column;padding:24px 18px;position:sticky;top:0;height:100vh;overflow-y:auto}
.rail-brand{display:flex;flex-direction:column;gap:4px;padding:0 6px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:14px}
.rail-brand .tag{font-family:var(--font-m);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--green)}
.rail-brand h1{font-size:17px;line-height:1.25}
.rail-nav{display:flex;flex-direction:column;gap:4px;flex:1}
.rail-item{display:flex;align-items:center;gap:12px;background:none;border:none;color:#cfd8f5;padding:10px 10px;border-radius:10px;text-align:left;width:100%;font-size:13.5px;transition:background .15s}
.rail-item:hover{background:rgba(255,255,255,.08)}
.rail-item.active{background:rgba(255,255,255,.14);color:#fff}
.rail-item .ring{flex:none}
.rail-item .lbl{display:flex;flex-direction:column;min-width:0}
.rail-item .lbl b{font-weight:600;font-size:13.5px;color:#fff;line-height:1.25}
.rail-item .lbl small{font-family:var(--font-m);font-size:10.5px;color:#9fb1e8;letter-spacing:.04em}
.rail-results{margin-top:8px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}
.rail-foot{font-size:11px;color:#8ea0d6;padding:14px 10px 0;line-height:1.6}
.rail-foot a{color:#cfe0ff}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;background:rgba(244,246,251,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:16px 32px;z-index:5}
.topbar-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.topbar h2{font-size:20px}
.topbar .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.topbar .progress-wrap{min-width:180px;text-align:right}
.progress-bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:8px}
.progress-bar > i{display:block;height:100%;background:var(--green);border-radius:4px;transition:width .25s}
.progress-label{font-family:var(--font-m);font-size:11.5px;color:var(--ink-soft);margin-top:4px}
.section-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.filter-bar{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.filter-tab{font-family:var(--font-m);font-size:12px;font-weight:600;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:8px;padding:5px 13px;cursor:pointer;transition:all .15s}
.filter-tab:hover{border-color:var(--navy-2);color:var(--navy-2)}
.filter-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.filter-tab .tab-count{font-size:10px;opacity:.75;margin-left:3px}
.pill.dim{opacity:.45}
.pill.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.question.hidden-by-filter{display:none}
.section-block.hidden-by-filter{display:none}
.section-block .section-remaining{font-family:var(--font-m);font-size:10px;color:var(--ink-soft);margin-left:8px;font-weight:500}
.pill{font-size:12px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;color:var(--ink-soft);text-decoration:none}
.pill:hover{border-color:var(--navy-2);color:var(--navy-2)}

.content{padding:28px 32px 80px;max-width:920px;width:100%;margin:0 auto}

/* ---------- Intro ---------- */
.hero{padding:8px 0 28px}
.hero .tag{font-family:var(--font-m);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy-2);font-weight:600}
.hero h1{font-size:34px;margin:10px 0 14px;color:var(--navy)}
.hero p{color:var(--ink-soft);font-size:15.5px;max-width:680px}
.hero-cta{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:14px;font-weight:600;padding:11px 18px;text-decoration:none}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-2)}
.btn.ghost:hover{border-color:var(--navy-2);color:var(--navy-2)}
.btn input[type=file]{display:none}

.domain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
@media (max-width:760px){.domain-grid{grid-template-columns:repeat(2,1fr)}}
.dcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.dcard .id{font-family:var(--font-m);font-size:11px;color:var(--green-text);font-weight:600;letter-spacing:.08em}
.dcard h3{font-size:15px;margin:6px 0 6px}
.dcard p{font-size:12.5px;color:var(--ink-soft);margin:0}
.dcard .meta{display:flex;justify-content:space-between;margin-top:10px;font-family:var(--font-m);font-size:11px;color:var(--ink-soft)}

.legend{margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media (max-width:760px){.legend{grid-template-columns:1fr}}
.legend h4{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px}
.scale-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.scale-row:last-child{border-bottom:none}
.scale-num{font-family:var(--font-m);font-weight:700;color:var(--navy);min-width:18px}
.scale-row b{display:block}
.scale-row span{color:var(--ink-soft);font-size:12.5px}
.level-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.level-row:last-child{border-bottom:none}
.level-row b{display:block}
.level-row span{color:var(--ink-soft);font-size:12.5px}
.level-chip{font-family:var(--font-m);font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;color:#fff;min-width:34px;text-align:center}.level-chip.dark{color:#002060}

/* ---------- Domain header ---------- */
.domain-head{margin-bottom:22px}
.domain-head .tag{font-family:var(--font-m);font-size:11px;color:var(--navy-2);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.domain-head h1{font-size:26px;color:var(--navy);margin:6px 0 8px}
.domain-head p{color:var(--ink-soft);max-width:700px}

/* ---------- Section / Question ---------- */
.section-block{margin-top:28px;scroll-margin-top:185px}
.section-title{font-size:14px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--navy);display:inline-block;padding-bottom:4px;margin-bottom:14px}
.question{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;transition:border-color .15s}
.question.answered{border-color:var(--green)}
.q-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.q-num{font-family:var(--font-m);font-size:12px;color:var(--green);background:var(--navy);border-radius:6px;padding:2px 7px;font-weight:700}
.q-title{font-size:15.5px;font-weight:600;flex:1}
.q-pts{font-family:var(--font-m);font-size:11px;color:var(--ink-soft)}
.q-text{color:var(--ink-soft);font-size:13.5px;margin:4px 0 14px}
.options{display:flex;flex-direction:column;gap:8px;border:none;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.provisional-badge{font-family:var(--font-m);font-size:11px;font-weight:700;background:#E8BD4A;color:#002060;border-radius:5px;padding:2px 8px;vertical-align:middle;margin-right:6px;letter-spacing:.06em}
.option{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:9px;padding:10px 12px;cursor:pointer;transition:background .12s,border-color .12s}
.option:hover{border-color:var(--navy-2)}
.option input{margin-top:3px;accent-color:var(--navy)}
.option.selected{background:var(--navy-soft);border-color:var(--navy-2)}
.opt-tag{font-family:var(--font-m);font-size:11px;font-weight:700;color:var(--navy);min-width:108px;flex:none;padding-top:1px}
.opt-desc{font-size:13px;color:var(--ink-soft)}
.option.selected .opt-desc{color:var(--ink)}

.domain-foot{display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:18px;border-top:1px solid var(--line)}

/* ---------- Results ---------- */
.results-summary{display:flex;gap:28px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.results-summary .text h2{font-size:20px;color:var(--navy)}
.results-summary .text p{color:var(--ink-soft);font-size:13.5px;max-width:420px;margin-top:6px}
.results-summary .completeness{font-family:var(--font-m);font-size:12px;color:var(--ink-soft);margin-top:10px}

.domain-results{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media (max-width:760px){.domain-results{grid-template-columns:repeat(2,1fr)}}
.dresult{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:center}
.dresult .id{font-family:var(--font-m);font-size:11px;color:var(--ink-soft);letter-spacing:.08em}
.dresult h4{font-size:13.5px;margin:4px 0 10px;min-height:34px}
.dresult .score-line{font-family:var(--font-m);font-size:12px;color:var(--ink-soft);margin-top:8px}
.dresult .level-tag{display:inline-block;margin-top:8px;font-size:11px;font-weight:700;border-radius:6px;padding:3px 10px;color:#fff}

.roadmap-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.roadmap-head h2{font-size:20px;color:var(--navy)}
.roadmap-head p{color:var(--ink-soft);font-size:13px;margin:4px 0 0}
.rd-domain{margin-bottom:18px}
.rd-domain summary{cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;font-weight:600;font-size:14.5px;color:var(--navy)}
.rd-domain summary::-webkit-details-marker{display:none}
.rd-domain summary .count{font-family:var(--font-m);font-size:11.5px;color:var(--ink-soft);font-weight:500}
.rd-domain[open] summary{border-bottom-left-radius:0;border-bottom-right-radius:0}
.rd-body{border:1px solid var(--line);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:6px 18px 14px;background:var(--surface)}
.rd-item{padding:14px 0;border-bottom:1px solid var(--line)}
.rd-item:last-child{border-bottom:none}
.rd-item-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rd-item-head .score-badge{font-family:var(--font-m);font-size:11px;font-weight:700;border-radius:6px;padding:2px 7px;color:#fff}
.rd-item h5{font-size:14px;margin:0}
.rd-steps{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.rd-step{display:flex;gap:10px;font-size:13px;color:var(--ink-soft)}
.rd-step b{font-family:var(--font-m);font-size:11px;color:var(--navy-2);min-width:46px;flex:none;padding-top:2px}
.empty-note{color:var(--ink-soft);font-size:13.5px;background:var(--green-soft);border-radius:var(--radius);padding:16px 18px}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px}

/* ---------- Gauges ---------- */
.gauge-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.gauge-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.gauge-center .pct{font-family:var(--font-m);font-weight:700;color:var(--navy);line-height:1}
.gauge-center .lvl{font-size:10.5px;color:var(--ink-soft);margin-top:2px;font-weight:600;max-width:70px}

/* ---------- Misc ---------- */
.kbd{font-family:var(--font-m);background:var(--navy-soft);border-radius:4px;padding:1px 5px;font-size:11px}
.mobile-nav{display:none}
@media (max-width:880px){
  .rail{position:fixed;left:-100%;top:0;height:100%;z-index:50;transition:left .2s;box-shadow:8px 0 24px rgba(0,0,0,.25)}
  .rail.open{left:0}
  .mobile-nav{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--navy);color:#fff;position:sticky;top:0;z-index:6}
  .mobile-nav button{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:8px 10px;font-size:14px}
  .mobile-nav span{font-family:var(--font-d);font-weight:600;font-size:14px}
  .content{padding:20px 16px 60px}
  .topbar{padding:14px 16px;position:relative}
  .domain-grid{grid-template-columns:1fr 1fr}
  .domain-results{grid-template-columns:1fr 1fr}
  .opt-tag{min-width:88px}
}

/* Autosave notice */
#autosave-notice{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:13px;border-radius:10px;padding:10px 18px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.25);white-space:nowrap}
@media (max-width:500px){#autosave-notice{white-space:normal;left:12px;right:12px;transform:none}}

@media print{
  .rail,.mobile-nav,.topbar,.toolbar,.hero-cta,.filter-bar{display:none !important}
  .content{max-width:100%;padding:0}
  .question{break-inside:avoid}
  body{background:#fff}
  .rd-domain{display:block !important;border:none}
  .rd-domain summary{display:none}
  .rd-body{display:block !important;border:none;padding:0}
  .rd-item{break-inside:avoid}
  details,.rd-domain[open]{display:block !important}
}

/* ---- Authentication Screen ---- */
#auth-screen{position:fixed;inset:0;z-index:1000;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.auth-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:36px 40px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,32,96,.12)}
.auth-brand{text-align:center;margin-bottom:26px;padding-bottom:22px;border-bottom:1px solid var(--line)}
.auth-logo{width:88px;height:88px;object-fit:contain;display:block;margin:0 auto 14px;filter:drop-shadow(0 2px 6px rgba(0,32,96,.15))}
.auth-tag-line{font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy-2);font-weight:600;display:block;margin-bottom:10px}
.auth-title{font-family:var(--font-d);font-size:21px;color:var(--navy);margin:0 0 8px;line-height:1.3}
.auth-subtitle{font-size:13px;color:var(--ink-soft);margin:0}
.auth-form{display:flex;flex-direction:column;gap:16px}
.auth-field{display:flex;flex-direction:column;gap:5px}
.auth-field label{font-size:13px;font-weight:600;color:var(--ink)}
.auth-field input{border:1.5px solid var(--line);border-radius:9px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;background:#fff;transition:border-color .15s,box-shadow .15s;color:var(--ink)}
.auth-field input:focus{border-color:var(--navy-2);box-shadow:0 0 0 3px rgba(27,62,140,.10)}
.auth-hint{font-size:11.5px;color:var(--ink-soft)}
.auth-error{font-size:13px;color:#c0392b;background:#fdf0ed;border-radius:8px;padding:10px 14px;display:none}
.auth-btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s;margin-top:4px;width:100%}
.auth-btn:hover:not(:disabled){background:var(--navy-2)}
.auth-btn:disabled{opacity:.65;cursor:not-allowed}
.auth-qr{text-align:center;margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
.auth-qr-label{font-size:12px;color:var(--ink-soft);margin-bottom:10px}
.qr-placeholder{font-family:var(--font-m);font-size:11px;color:var(--ink-soft);padding:18px 12px;background:var(--navy-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center;min-height:60px}
#main-app{min-height:100vh;display:none}
</style>
</head>
<body>

<!-- ========== Authentication Screen ========== -->
<div id="auth-screen">

     "question": "Does the entity maintain an up-to-date register of all compliance and regulatory obligations across every jurisdiction it operates in?",

      "0": "No register exists or obligations are tracked informally",
      "1": "A register exists for India only; international jurisdictions not covered or not systematically maintained",

     "guidance": {
      "1": "Start with India. Create a simple spreadsheet listing every statutory and professional obligation the entity has — ICAI membership renewals, UDIN compliance, GST filings, MSME registrations, labour law returns, and any sector-specific requirements for clients. Date each entry and assign an owner. This is your baseline.",
      "2": "Extend the register to cover every geography where the entity has registered entities, staff, or regular client engagements. For each jurisdiction add: the specific law or regulation, the obligation type (filing, payment, reporting, renewal), the due date, the responsible person, and the consequence of non-compliance. Use a shared tool so it is visible beyond a single partner.",
      "3": "Introduce a formal update process. The register must be treated as a living document. Assign a quarterly review cycle — each obligation owner conentities currency. When a regulatory change occurs in any jurisdiction, a documented update must be made within 30 days, with a log entry recording what changed, when it was updated, and by whom.",
      "4": "Tools such as Microsoft Lists, Notion, or a purpose-built compliance management system can automate this."
     }

     "guidance": {
      "1": "Formally designate one person — a partner or senior manager — as the compliance lead. Document this designation in writing: a brief role description specifying that the individual is responsible for monitoring regulatory changes in all jurisdictions in which the entity operates. Share this with all staff. Even a one-page document changes the accountability dynamic significantly.",
      "2": "Expand the mandate explicitly to global jurisdictions. The compliance lead should subscribe to regulatory alert services for each relevant geography. ICAI's own regulatory updates cover India; for international jurisdictions, tools such as Wolters Kluwer CCH Incorporated regulatory alerts, PwC's Worldwide Tax Summaries (free), and KPMG's global tax and legal updates are practical starting points. Set a formal calendar for quarterly compliance review meetings with documented minutes.",
      "3": "Formalise the role with a documented job description, a reporting line to the Managing Partner or Governance Committee, and a defined time allocation (e.g., minimum 10% of working time).",
      "4": "The compliance function should produce a written quarterly update circulated to all partners summarising regulatory changes and their implications. This creates the institutional record that a global client will look for during vendor onboarding."
     }
    },
    {
     "qnum": 3,
     "title": "Dashboard",
     "points": 4,
     "section": "Compliance Infrastructure",
     "question": "Does the entity use a structured compliance dashboard or automated reporting tool to monitor regulatory obligations across jurisdictions?",
     "criteria": {
      "0": "No compliance monitoring tool or dashboard exists",
      "1": "Obligations tracked through informal means such as personal calendars or unstructured spreadsheets",
      "2": "A basic shared spreadsheet or calendar exists listing key deadlines but lacks real-time status visibility, does not cover all jurisdictions, and is not integrated with governance reporting",
      "3": "A dedicated compliance management tool or structured internal dashboard maps all obligations to responsible owners, due dates, and current status; generates alerts",
      "4": "Produces compliance status reports feeding into quarterly governance reporting"
     },
     "guidance": {
      "1": "Build a structured compliance tracker in a shared tool. Even a well-designed Excel or Google Sheets workbook with colour-coded RAG status, due date columns, and a responsibility column is significantly better than no system. The key is that it is shared, visible to leadership, and updated regularly.",
      "2": "Migrate to a purpose-built compliance management tool. At this level the entity should have real-time status visibility across jurisdictions, automated due date alerts, and a dashboard view accessible to the compliance officer and senior leadership. Tools appropriate for mid-sized Indian CA entities include: Diligent Compliance, Haloai, and for smaller entities, Zoho One's compliance modules. Ensure the tool covers all jurisdictions in the register and integrates with the entity's existing workflow.",
      "3": "The compliance dashboard should become the single source of truth for all regulatory obligations and feed directly into the quarterly governance report presented to the Managing Partner or Board. Configure automated escalation alerts for obligations approaching their due date (30-day and 7-day warnings).",
      "4": "Produce a monthly compliance status report as a standard dashboard output. Ensure the system maintains an audit trail of updates and sign-offs."
     }
    },
    {
     "qnum": 4,
     "title": "Training",
     "points": 4,
     "section": "Regulatory Operations",
     "question": "Are compliance training programmes mandatory for all staff and updated whenever regulations change?",
     "criteria": {
      "0": "No formal compliance training programme exists",
      "1": "Training exists but is voluntary or covers Indian regulations only; not updated on regulatory change",
      "2": "Training is mandatory and updated on regulatory change but does not cover regulations in all jurisdictions the entity operates in or serves",
      "3": "Mandatory training covers all applicable jurisdictions, is updated within a defined period of each regulatory change",
      "4": "Includes completion tracking and version control"
     },
     "guidance": {
      "1": "Begin with India-focused compliance training. Create a mandatory annual training programme covering the regulatory requirements most relevant to the entity's practice areas — ICAI Code of Ethics, PMLA obligations, key provisions of the IT Act, and any sector-specific requirements. Track attendance and maintain a completion log.",
      "2": "Extend training content to cover international regulatory environments relevant to the jurisdictions the entity operates in or serves. For clients with UK parent entities, staff should understand obligations under the UK Bribery Act. For EU-based clients, GDPR principles should be included in training. Partner with a legal advisory panel or use online platforms such as KPMG Learn or EY Badges for jurisdiction-specific modules.",
      "3": "Introduce a formal update mechanism. Whenever a material regulatory change occurs in any relevant jurisdiction, the training content must be updated and staff must complete the updated module within a defined period (recommended: 60 days of the change taking effect).",
      "4": "Maintain version control on all training materials. Assign a completion tracking system — even a simple sign-off sheet for smaller entities, or an LMS for larger ones."
     }
    },
    {
     "qnum": 5,
     "title": "Audit Response",
     "points": 4,
     "section": "Regulatory Operations",
     "question": "Does the entity have documented procedures for responding to regulatory audits or investigations within each geography?",
     "criteria": {
      "0": "No documented response procedures exist; the entity would respond ad hoc",
      "1": "A general response protocol exists but is limited to India only",
      "2": "Procedures exist for most geographies but lack operational detail (e.g., no designated response lead, no regulator notification timelines, no legal escalation triggers)",
      "3": "Documented, jurisdiction-specific procedures exist for all geographies covering: response lead, document preservation, regulator timelines, legal escalation, and staff briefing protocols.",
      "4": "Reviewed annually and tested through tabletop exercises"
     },
     "guidance": {
      "1": "Document a general response protocol for regulatory audits in India. This should cover: who the designated response lead is (typically the Managing Partner), what documents must be preserved immediately upon receipt of an audit notice, what the typical response timelines are for Indian regulators (ICAI, Income Tax, GST, ROC), and when legal counsel should be engaged. Even a two-page SOP achieves this.",
      "2": "Extend the protocol to cover each geography where the entity operates. For each jurisdiction, document the specific regulator(s) that could initiate an audit (e.g., HMRC in the UK, IRS in the US, SEBI equivalent in relevant market), the specific response timeline obligations imposed by that regulator, the document preservation obligations, and the legal counsel contact to engage for that jurisdiction. Conduct a tabletop walkthrough with key staff annually.",
      "3": "Formalise the procedures into a documented Regulatory Audit Response Manual. Each jurisdiction section should cover: designated response lead and backup, a document preservation checklist triggered upon receipt of audit notice, regulator-specific notification timeline (with specific number of days), legal escalation triggers and panel counsel contacts for each jurisdiction, staff communication protocols (what to say, what not to say), and post-audit remediation procedure.",
      "4": "Test the manual through a tabletop exercise at least once annually and record the outcomes."
     }
    },
    {
     "qnum": 6,
     "title": "AML/GDPR Policies",
     "points": 4,
     "section": "Regulatory Operations",
     "question": "Are anti-bribery, AML, and data protection (GDPR/DPDPA 2023) policies formally embedded in global operations?",
     "criteria": {
      "0": "No formal anti-bribery, AML, or data protection policies exist",
      "1": "Policies exist but are India-centric only (e.g., reference only Indian anti-corruption law and DPDP); no coverage of UK Bribery Act, FATF, EU GDPR as applicable",
      "2": "Policies reference international frameworks but are not operationalised through training, client onboarding or periodic compliance checks",
      "3": "Policies reference all applicable international frameworks, are operationalised through staff training and onboarding procedures",
      "4": "Reviewed at least annually, with evidence of implementation maintained"
     },
     "guidance": {
      "1": "Draft standalone policy documents for each of the three areas. The anti-bribery policy should reference the Prevention of Corruption Act 1988 and explicitly prohibit facilitation payments. The AML policy should reference PMLA 2002 and define client due diligence procedures. The data protection policy should reference the DPDP Act 2023. Communicate these to all staff and obtain signed acknowledgements.",
      "2": "Upgrade each policy to explicitly address international frameworks applicable to the entity's client geographies. The anti-bribery policy should reference the UK Bribery Act 2010 (which has extraterritorial reach to Indian entities with UK connections) and the US Foreign Corrupt Practices Act where relevant. The AML policy should reference FATF Recommendations as the international standard.",
      "3": "The data protection policy should address EU GDPR obligations where the entity handles data of EU data subjects. This upgrade typically requires input from a legal advisor with international practice experience.",
      "4": "Operationalise the policies beyond documentation. Each policy must have: a mandatory training component (addressed in Q4), a client onboarding procedure that implements the policy (e.g., AML client due diligence checklist used for every new engagement), a periodic compliance check (annual policy review with documented outcomes), and evidence that the policy has been applied in practice (e.g., signed client DDQ responses conentitying AML compliance)."
     }
    },
    {
     "qnum": 7,
     "title": "Minimum Wage",
     "points": 4,
     "section": "Labour & Insurance Compliance",
     "question": "Does your entity comply with minimum wage requirement applicable in your jurisdiction as well as in territories where you serve?",
     "criteria": {
      "0": "No assessment of minimum wage obligations for India has been conducted",
      "1": "No assessment of minimum wage obligations beyond India has been conducted",
      "2": "The entity is aware of obligations in primary operating jurisdictions but has not conducted a formal compliance review across all geographies where staff are deployed",
      "3": "Formal identification and documentation of obligations exists across all geographies",
      "4": "Annual compliance review and evidence of compliance maintained"
     },
     "guidance": {
      "1": "Conduct a formal assessment of minimum wage obligations in India. Ensure compliance with the Code on Wages 2019 (when notified in full), state-specific minimum wage notifications, and ESIC/PF obligations. Document the current wage rates applicable to each employee category and conentity compliance.",
      "2": "Identify all geographies where the entity has staff deployed — this includes staff seconded to client sites abroad, staff working from international offices, and any remote staff based in foreign jurisdictions. For each geography, identify the applicable minimum wage law, the current rate, and whether the entity's compensation meets it. This often requires input from a local employment law advisor for each jurisdiction.",
      "3": "Formalise the compliance review into an annual process. Document the applicable minimum wage rate in each jurisdiction, the entity's current compensation structure against it, and the date of last review.",
      "4": "When the entity enters a new geography or changes its staffing model (e.g., deploying staff to a client site in a new country), trigger an immediate compliance check before deployment. Maintain this as a documented record."
     }
    },
    {
     "qnum": 8,
     "title": "PI Insurance",
     "points": 4,
     "section": "Labour & Insurance Compliance",
     "question": "Does the entity's Professional Indemnity Insurance cover the geographies and liability quantum required by its global clients?",
     "criteria": {
      "0": "No PI policy held",
      "1": "Standard Indian PI policy held with no assessment of cross-border coverage or client quantum requirements",
      "2": "Entity is aware of coverage gap and has initiated a review but policy has not been updated or independently verified",
      "3": "PI policy has been reviewed for all geographies of operation; liability quantum meets or exceeds client requirements",
      "4": "Reviewed annually and updated when new geographies are added"
     },
     "guidance": {
      "1": "Review the entity's current PI policy in detail. Most standard Indian PI policies issued by New India Assurance or similar cover claims brought under Indian jurisdiction only. Identify: the territorial scope of the current policy, the limit of indemnity, whether legal defence costs are included, and any exclusions relevant to the entity's service lines. Share this review with the entity's broker.",
      "2": "Brief the entity's insurance broker on the specific geographies in which the entity operates or intends to operate, and the service lines being delivered. Request a review of whether the current policy provides coverage for claims arising from those geographies",
      "3": "For entities operating in the UK, US, or Australia, a UK or internationally placed PI policy (through Lloyd's of London market or an internationally recognised insurer) may be required. Obtain a written opinion from the broker on coverage adequacy.",
      "4": "Align the PI coverage with the specific requirements of the entity's global clients. When entering new client engagements or responding to vendor questionnaires, review the PI requirements stated in the client's terms and ensure the policy meets or exceeds those requirements. Schedule an annual PI review in advance of each policy renewal, incorporating any new geographies or client requirements from the preceding year. Maintain a documented record of each review and the policy adjustments made."
     }
    },
    {
     "qnum": 9,
     "title": "Governance Framework",
     "points": 4,
     "section": "Governance Architecture",
     "question": "Is the entity's corporate governance framework benchmarked against internationally recognised standards (such as ISQM, ISO 9001, or equivalent) that global enterprise clients would recognise during vendor due diligence?",
     "criteria": {
      "0": "Governance operates through informal partner conventions; no formal framework or benchmarking",
      "1": "A documented governance framework exists but has been developed independently without reference to any internationally recognised standard",
      "2": "Framework has been formally benchmarked against one or more recognised standards (ISQM 1, ISO 9001, ISAE 3000 or equivalent)",
      "3": "Documentation demonstrating alignment is available",
      "4": "Reviewed at least annually"
     },
     "guidance": {
      "1": "Document the entity's current governance structure. This means writing down — for the first time, in many cases — how decisions are made, how partners are accountable to each other and to clients, how conflicts of interest are managed, and what the escalation path is for significant entity-level decisions. This does not need to be a formal framework initially; a Partner Governance Charter of 3–5 pages achieves the basic requirement.",
      "2": "Benchmark the documented governance framework against ISQM 1 (International Standard on Quality Management). ISQM 1 requires entities to define quality objectives, identify quality risks, design responses, and implement a monitoring and evaluation process. Read through ISQM 1 and annotate each requirement against what the entity currently does. This gap analysis itself is valuable and begins the benchmarking process. The ICAI's guidance on ISQM 1 implementation provides Indian-context guidance.",
      "3": "Formally document that the governance framework has been benchmarked against ISQM 1 (or ISO 9001 for broader quality management). Produce a Governance Framework document that explicitly references the standard it has been aligned to, identifies any gaps, and records the date of benchmarking and the reviewer.",
      "4": "This document should be available to share with global clients during vendor due diligence. Conduct an annual review with documented outcomes."
     }
    },
    {
     "qnum": 10,
     "title": "ERM",
     "points": 4,
     "section": "Governance Architecture",
     "question": "Is there a documented enterprise risk management (ERM) framework reviewed and updated at least annually?",
     "criteria": {
      "0": "No ERM framework exists; risks managed reactively at engagement or partner level",
      "1": "An ERM framework has been drafted but not formally adopted, does not cover all risk categories (strategic, operational, financial, compliance, reputational), or has not been reviewed since preparation",
      "2": "A formal Enterprise Risk Management (ERM) framework is established, covering all significant risk categories, with clear ownership assigned for each risk.",
      "3": "A comprehensive risk register is maintained to document identified risks, along with their assessments and mitigation plans.",
      "4": "The risk register is reviewed and updated at least annually by senior leadership, with key findings reported to the board or an equivalent governing body."
     },
     "guidance": {
      "1": "Conduct a first-pass risk identification exercise. Bring together the entity's senior partners for a structured session and identify the top 10–15 risks facing the entity across five categories: strategic (e.g., loss of key client), operational (e.g., key person dependency), financial (e.g., credit risk on receivables), compliance (e.g., regulatory breach), and reputational (e.g., quality failure on a major engagement). Record these in a risk register with a responsible owner for each. This is a nascent ERM framework.",
      "2": "Formalise the ERM framework document. Using ISO 31000 as a reference, define: the entity's risk appetite statement, the risk identification and assessment methodology (likelihood × impact matrix), the risk register format, the escalation thresholds (what constitutes a critical risk requiring immediate board attention), and the annual review cadence. Assign risk owners for each category and hold a formal annual ERM review meeting with documented minutes.",
      "3": "The ERM framework should be a living governance document reviewed by senior leadership at least annually, with findings formally reported to the Board or equivalent. Integrate the risk register into the quarterly governance reporting cycle.",
      "4": "Update the framework whenever the entity enters a new geography, launches a new service line, or experiences a significant incident. External benchmarking against ISO 31000 or COSO ERM framework provides additional credibility for global clients."
     }
    },
    {
     "qnum": 11,
     "title": "Risk Function",
     "points": 4,
     "section": "Governance Architecture",
     "question": "Do you have a dedicated Risk Management professional / team with defined responsibilities?",
     "criteria": {
      "0": "No dedicated risk management resource",
      "1": "Assumed to be a shared partner responsibility with no formal accountability",
      "2": "A partner or senior staff member is informally designated for risk management but the role is undocumented, has no defined scope separate from client delivery, and is unsupported by tools or framework",
      "3": "A dedicated risk management professional or team is established, with formally documented roles, clear responsibilities across all enterprise risk domains, and defined reporting lines to senior leadership.",
      "4": "The team is sufficiently resourced to effectively manage and sustain the ERM framework and maintain the risk register."
     },
     "guidance": {
      "1": "Formally designate a Risk Management lead. This is typically a senior partner or experienced manager. Document the designation in writing, specifying that the role includes: maintaining the ERM framework and risk register, monitoring the entity's compliance obligations, and escalating critical risks to the Managing Partner. Even a one-page role description changes the accountability structure.",
      "2": "Define the scope of the Risk Management lead's responsibilities across all enterprise risk domains — strategic, operational, financial, compliance, and reputational. Ensure the reporting line runs directly to the Managing Partner or equivalent senior leadership.",
      "3": "Allocate defined time to the role (minimum 15–20% of working time for a entity operating in multiple geographies). Provide access to necessary tools and information to discharge the role effectively.",
      "4": "Resource the function adequately for the entity's scale and geographic footprint. For entities with significant international operations, this may mean a dedicated risk manager (not a partner with split responsibilities). The function should actively maintain the ERM framework and risk register, produce the quarterly governance report inputs, and coordinate with the compliance function on regulatory change monitoring. Document the function's outputs and review the role description annually."
     }
    },
    {
     "qnum": 12,
     "title": "Org Structure",
     "points": 4,
     "section": "Scalability & Oversight",
     "question": "Does the entity's organisational structure support rapid scaling across new geographies without restructuring core operations?",
     "criteria": {
      "0": "No formal leadership, HR, or operational structure",
      "1": "Entity structure is built around current geographies; adding a new geography would require significant leadership, HR, or operational restructuring",
      "2": "Scalability has been considered but not formally designed or documented; some portable elements exist (e.g., standardised delivery frameworks) but significant gaps remain",
      "3": "A documented scalable operating model exists covering governance templates, portable HR and compliance policies, an expansion document, and modular service delivery frameworks.",
      "4": "Validated through at least one actual expansion or formal scenario planning exercise"
     },
     "guidance": {
      "1": "Assess the entity's current structural scalability honestly. Ask: if the entity won a significant new engagement requiring delivery in a country it has not operated in before, what would need to change? If the answer is 'everything' — leadership, HR policies, service delivery frameworks, compliance procedures — the entity is at zero. If some elements are already portable (e.g., standardised engagement letters, a central delivery methodology), document them. This is the baseline.",
      "2": "Design and document a scalable operating model. This is a set of portable building blocks that can be deployed to a new geography without rebuilding from scratch. The minimum viable scalable model covers: a governance template for a new-geography entity or operation (decision rights, reporting lines, authority matrix); portable HR policies (compensation framework, leave policy, code of conduct) that can be applied with local law adaptations; a standard service delivery methodology; and a compliance checklist for new-geography entry. Document these as standalone templates.",
      "3": "Build and test a structured expansion playbook—a documented step-by-step process for entering a new geography. The playbook should cover entity structure options, regulatory registration requirements, HR policy localisation steps, client onboarding procedures for that market, and compliance obligations.",
      "4": "Validate the playbook through at least one actual geographic expansion or a formal scenario planning exercise that stress-tests the model. Update the playbook annually."
     }
    },
    {
     "qnum": 13,
     "title": "Board Reporting",
     "points": 4,
     "section": "Scalability & Oversight",
     "question": "Are key governance metrics (risk exposure, audit findings, compliance scores) reported to the board/senior leadership quarterly?",
     "criteria": {
      "0": "No formal governance reporting to board or senior leadership; matters raised informally as they arise",
      "1": "Governance reporting occurs but is irregular, incomplete, or triggered only by significant incidents; does not cover all key metrics",
      "2": "A formal quarterly governance report covering risk exposure, audit findings, and compliance scores is prepared and presented to board or senior leadership",
      "3": "Follows a standard template; is archived",
      "4": "Triggers documented follow-up actions"
     },
     "guidance": {
      "1": "Establish a basic governance reporting rhythm. At a minimum, hold a quarterly partners' meeting at which risk, compliance, and quality metrics are formally on the agenda. Even if the data is incomplete initially, the act of putting it on the agenda and discussing it creates the governance habit. Record the outcomes in meeting minutes.",
      "2": "Develop a standard Quarterly Governance Report template. The template should include sections for: risk register status (top 5 risks, status, trend), compliance scorecard (key obligations met/missed, upcoming obligations), audit and quality findings (ISQM monitoring outcomes, client complaint summary), financial risk indicators (debtor aging, concentration risk), and key actions from the previous quarter with completion status. Produce this report before each quarterly meeting and archive it.",
      "3": "Ensure every item in the governance report triggers a documented response. Each risk rated above the entity's risk appetite threshold should have an assigned action, owner, and target date. Missed compliance obligations should trigger a root-cause note.",
      "4": "Quality findings should feed into training or process improvement actions. The power of governance reporting is not in the report itself but in the disciplined follow-through it enables. Archive all reports and action logs."
     }
    },
    {
     "qnum": 14,
     "title": "Scenario Planning",
     "points": 4,
     "section": "Scalability & Oversight",
     "question": "Is the entity's scalability tested through formal scenario planning (new country entry, significant headcount growth, M&A)?",
     "criteria": {
      "0": "No scenario planning conducted",
      "1": "The entity responds to growth opportunities reactively",
      "2": "Informal partner-level discussions about scalability scenarios have occurred but no structured exercise with documented assumptions, outcomes, or action plans has been completed",
      "3": "Formal scenario planning exercises are conducted at least annually covering defined global service delivery–relevant scenarios.",
      "4": "Each exercise produces documented findings, identified gaps, and a time-bound action plan reviewed by senior leadership"
     },
     "guidance": {
      "1": "Conduct an initial informal scenario discussion at the partner level. Choose one growth scenario relevant to the entity’s global ambitions — for example, “What would we need to do to open an office in Dubai within 18 months?” Work through key dimensions such as regulatory requirements, staffing, governance, client pipeline, and capital requirements. Record the discussion and the gaps identified. This is not yet formal scenario planning but helps build the initial thinking framework.",
      "2": "Formalise the scenario planning process. Define 3–4 standard scenarios relevant to the entity’s global growth strategy: new country entry, doubling of headcount, acquisition of a smaller entity, and loss of a major client. For each scenario, document the key assumptions, the entity’s current readiness across governance, people, process, technology, and compliance, the gaps identified, and a time-bound action plan to address them. Conduct this exercise at least annually.",
      "3": "Embed scenario planning as a formal governance event reviewed by senior leadership. Each scenario exercise should produce a written output — a Scenario Readiness Report — reviewed and signed off by the Managing Partner.",
      "4": "Track action plan completion between exercises. Introduce new scenarios as the entity's strategy evolves. Consider using an external facilitator for the scenario planning session to ensure objectivity and challenge of assumptions."
     }
    },
    {
     "qnum": 15,
     "title": "BCP/DRP Existence",
     "points": 4,
     "section": "Business Continuity",
     "question": "Is there Business Continuity Plans (BCP) and Disaster Recovery Plans (DRP) in force?",
     "criteria": {
      "0": "No BCP or DRP exists",
      "1": "The entity would respond to disruption on an ad hoc basis",
      "2": "A BCP and/or DRP document exists but has not been reviewed recently, does not cover all critical functions and geographies, or has never been tested",
      "3": "Both BCP and DRP are formally documented, approved by leadership, cover all critical functions and geographies",
      "4": "Define recovery time objectives, responsible owners and escalation procedures, are in active force and reviewed at least annually"
     },
     "guidance": {
      "1": "Conduct a Business Impact Analysis (BIA). Before writing a BCP, the entity must understand what it is protecting. For each critical function — client delivery, data access, communication, financial processing — identify: the maximum tolerable downtime (how long can this function be offline before it causes serious harm?), the recovery time objective (how quickly must it be restored?), and the recovery point objective (how much data loss is acceptable?). This analysis is the foundation of any credible BCP.",
      "2": "Draft both a BCP and a DRP. The BCP covers the human and operational response to disruption — who is in charge, how are clients notified, where do staff work if the office is unavailable, what are the decision trees for different scenarios (flood, power failure, pandemic, cyber incident).",
      "3": "The DRP covers the technical recovery of IT systems and data — backup restoration procedures, system failover processes, data integrity verification. Each plan must name responsible owners, define communication protocols, and specify escalation paths.",
      "4": "Ensure both plans are formally approved by entity leadership and actively maintained. 'In force' means: the plans have been communicated to all relevant staff, they are stored in a location accessible even when primary systems are unavailable (e.g., a printed copy and a cloud-hosted version), they have been reviewed within the last 12 months, and the recovery time and recovery point objectives have been validated against current systems and data volumes. Update the plans whenever a significant operational change occurs."
     }
    },

    {
     "qnum": 17,
     "title": "Whistleblower",
     "points": 4,
     "section": "Integrity & Quality",
     "question": "Does the entity have a documented, confidential whistleblower or ethics reporting mechanism accessible to all staff across all geographies?",
     "criteria": {
      "0": "No whistleblower or ethics reporting mechanism exists",
      "1": "Staff have no formal channel other than their direct superior",
      "2": "An informal process exists (e.g., a designated partner to approach) but is undocumented, does not guarantee confidentiality, and is not consistently communicated to all staff across all geographies",
      "3": "A formally documented, confidential mechanism is in place, accessible to all staff regardless of geography; communicated at onboarding",
      "4": "Handled by an independent function; includes retaliation protections, investigation timelines, and escalation procedures; usage and outcomes reported anonymously to the board annually"
     },
     "guidance": {
      "1": "Designate an ethics reporting contact who is independent of the line management chain — ideally a senior partner not involved in day-to-day operations, or an independent external advisor. Communicate this contact's details to all staff. Create a simple written policy stating that staff may report ethical concerns to this contact without fear of retaliation. Even this basic step represents a significant advance over no mechanism at all.",
      "2": "Document a formal Whistleblower and Ethics Reporting Policy. The policy must cover: who may report (all staff, all geographies, contractors), what may be reported (any suspected violation of law, regulation, professional standards, or entity policy), how reports are made (dedicated email address, phone line, or third-party platform), who receives reports (the designated ethics contact, with a defined escalation path), how confidentiality is protected, what retaliation protections apply, and what the investigation timeline is (recommended: acknowledgement within 5 days, investigation concluded within 60 days). Communicate the policy to all staff at onboarding and annually thereafter.",
      "3": "Implement a confidential reporting channel that is genuinely accessible across all geographies — not just an email address that routes to a partner's inbox. Third-party anonymous reporting platforms (such as EthicsPoint, Navex, or similar) are the gold standard and are affordable even for mid-sized entities.",
      "4": "Ensure the policy includes specific non-retaliation provisions with named consequences for violation. Report usage statistics and investigation outcomes (anonymised) to the Board annually. This annual board-level reporting is the institutional signal that ethics oversight is a governance priority, not a compliance box."
     }
    },
    {
     "qnum": 18,
     "title": "External Review",
     "points": 4,
     "section": "Integrity & Quality",
     "question": "Has the entity's governance framework or compliance posture been subject to an independent external review or accreditation in the last three years?",
     "criteria": {
      "0": "No independent external review, peer review, or accreditation of governance framework or compliance posture has been undertaken",
      "1": "The entity has undergone an ICAI peer review (audit quality focus only)",
      "2": "but this has not extended to broader governance or compliance posture, or the last review was more than three years ago",
      "3": "Within the last three years, governance framework or compliance posture has been independently reviewed or accredited by a recognised external body (ICAI peer review with governance scope, ISO 9001 certification, ISQM 1 readiness assessment, or equivalent)",
      "4": "Outcomes and remediation actions documented"
     },
     "guidance": {
      "1": "Begin with the ICAI Peer Review. If the entity has not undergone a Peer Review, initiate the process through the ICAI Peer Review Board. An ICAI Peer Review covers practice management, human resources, and engagement performance — it is a meaningful external validation even though it is primarily audit-quality focused. Ensure the Peer Review certificate is current and visible to clients.",
      "2": "Extend the scope of external validation beyond audit quality. Commission an ISQM 1 readiness assessment by an independent reviewer — this is distinct from an ICAI Peer Review in that it assesses the entity's quality management system against the ISQM 1 standard.",
      "3": "Alternatively, pursue ISO 9001 certification for quality management systems. Both options provide a form of third-party validation that is recognised by global enterprise clients. Document the assessment outcomes and any remediation actions taken.",
      "4": "Make external review a three-year governance commitment. Formalise the cycle: ICAI Peer Review (mandatory), ISQM 1 readiness assessment or ISO 9001 re-certification, and a governance review covering compliance posture for entities with significant international operations. Ensure findings from each review are documented, remediation actions are tracked to completion, and the governance review cycle is reported in the entity's annual governance report. Share a summary of the most recent external review outcomes with global clients during vendor due diligence."
     }

     "qnum": 19,
     "title": "ISQM 1",
     "points": 4,
     "section": "Integrity & Quality",
     "question": "Has the entity established an entity-wide Quality Management System (QMS) in accordance with ISQM 1 (or SQC 1 as a transitional baseline), covering documented quality objectives, risk assessment, and a monitoring and remediation programme?",
     "criteria": {
      "0": "No QMS aligned to ISQM 1 or SQC 1 exists",
      "1": "Quality management relies solely on engagement-level controls",
      "2": "Implementation has commenced (quality objectives identified, some policies documented) but key components — entity-level quality risk assessment, monitoring programme, or formal remediation process — are not yet fully operational",
      "3": "A entity-wide QMS fully aligned with ISQM 1 (or SQC 1 as a documented transitional baseline) is established and operational; covers: quality objectives, quality risk assessment, risk responses embedded in entity policies, a monitoring and evaluation programme, and a documented remediation process",
      "4": "Reviewed at least annually by leadership"
     },
     "guidance": {
      "1": "Begin with SQC 1 compliance as a documented transitional baseline. ISQM 1 is the current international standard but SQC 1 remains the ICAI-mandated framework. Conduct a gap analysis comparing the entity's current practices against all six components of SQC 1: leadership responsibilities for quality, ethical requirements, acceptance and continuance of client relationships, human resources, engagement performance, and monitoring. Document the gaps and assign owners to close them. This gap analysis is the foundation of a transitional QMS.",
      "2": "Implement the ISQM 1 framework in two phases. Phase 1 covers the design components: document the entity's quality objectives (what does a quality outcome look like for each service line?), identify quality risks that threaten those objectives, and design policy responses to each identified risk. Phase 2 covers the operational components: implement the policies, build the monitoring programme (how will the entity check that the policies are working?), and establish the remediation process (what happens when a deficiency is identified?). ICAI's ISQM 1 implementation guidance and the IAASB's implementation support materials are directly usable resources for this phase.",
      "3": "Operate the full ISQM 1 QMS through at least one complete annual cycle — this means completing the monitoring programme, identifying any deficiencies found, implementing remediation, and conducting the annual leadership evaluation.",
      "4": "Communicate the QMS and its outcomes to all relevant personnel. Review the QMS annually with senior leadership and update quality objectives and risk responses where the entity's circumstances have changed. An externally facilitated ISQM 1 readiness assessment (provides independent validation that the QMS meets the standard."
     }
    }

     "title": "International Client Acquisition Strategy",
     "points": 4,
     "section": "Client Acquisition & Business Development",
     "question": "Does the entity have a formally documented strategy for acquiring international clients — covering target segments, value proposition, outreach channels, and conversion process — tailored for global service delivery?",
     "criteria": {
      "0": "No client acquisition strategy; international enquiries are handled ad-hoc.",

      "4": "A fully documented, board-reviewed client acquisition strategy with SMART targets, multi-channel outreach, CRM-tracked pipeline, and quarterly review cadence."
     },
     "guidance": {
      "1": "Develop a 2-page client acquisition strategy document. Structure it in four parts: (1) Target Client Profile — size, geography, industry, pain points; (2) Value Proposition — what uniquely positions your entity as the right partner; (3) Channels — how you will reach prospects (LinkedIn, referrals, industry events, trade bodies); (4) Conversion Process — from first contact to signed engagement.",
      "2": "Define 3 Ideal Client Profiles (ICPs): for example, a UK-based mid-market accounting entity looking to offshore compliance work, a US CPA practice seeking India-based bookkeeping support, or a Middle East–based family office needing IFRS reporting.",
      "3": "Implement a simple CRM (HubSpot Free, Zoho CRM) to track your international pipeline — stages, contacts, next actions, and expected close dates.",
      "4": "Review your acquisition strategy quarterly — adjust based on which channels and messages are generating the most traction."
     }

     "title": "Lead Generation & Sales Pipeline",
     "points": 4,
     "section": "Client Acquisition & Business Development",
     "question": "Does the entity have an active, structured international lead generation programme — including inbound (digital content, referrals, SEO) and outbound (direct outreach, networking, events) activities — with a visible and tracked sales pipeline?",

     "guidance": {
      "1": "Start with two channels: LinkedIn (organic content + direct outreach to target clients) and referral partnerships (ask existing international contacts to introduce you). These are zero-cost and highly effective for professional services.",

      "4": "Aim for a minimum pipeline of 10 qualified prospects at any time. If your pipeline falls below this, it is a leading indicator of future revenue gaps — increase outreach immediately."

     "title": "Data Privacy & Cross-Border Data Compliance",
     "points": 4,
     "section": "International Regulatory & Compliance Readiness",
     "question": "Is the entity compliant with — or actively working towards compliance with — the data privacy regulations of its target international markets (e.g., GDPR for Europe/UK, CCPA for California, PDPA for Singapore, DIFC for UAE)?",
     "criteria": {
      "0": "No awareness or action on international data privacy regulations.",
      "1": "General awareness of GDPR/international privacy laws; no formal compliance steps taken.",
      "2": "A data privacy policy exists; basic client data protections in place; formal compliance not certified.",
      "3": "Formally compliant with GDPR or 1–2 target-market data privacy regulations; documented Data Processing Agreements in use.",
      "4": "Full data privacy compliance across all target markets; certified (e.g., ISO 27701); Data Processing Agreements signed with all clients; a designated Data Protection Officer; annual privacy audits conducted."
     },
     "guidance": {
      "1": "Begin with GDPR compliance — it is the most demanding standard globally and compliance with it substantially covers requirements in most other jurisdictions (UK, Australia, Singapore, UAE). Key steps: appoint a Data Protection Lead, maintain a Record of Processing Activities (ROPA), implement a Data Breach Response Plan, and ensure all client contracts include a Data Processing Agreement (DPA).",
      "2": "Use a free GDPR readiness checklist from the ICO (Information Commissioner's Office, UK) at ico.org.uk to assess your current gap.",
      "3": "Implement encryption for all client data in transit and at rest, restrict data access on a need-to-know basis, and document your data retention and deletion policy.",
      "4": "For clients in the UAE: familiarise yourself with the UAE Federal Decree-Law No. 45 of 2021 on Personal Data Protection and DIFC Data Protection Law 2020 if serving DIFC-based clients.",
      "5": "Consider obtaining ISO 27001 certification — this is increasingly demanded by international clients as a baseline data security assurance."
     }

    {
     "qnum": 16,
     "title": "Client Relationship Management & Expansion",
     "points": 4,
     "section": "Client Retention & Expansion",
     "question": "Does the entity have a formal client relationship management (CRM) process for international clients — including regular check-ins, satisfaction measurement, account growth plans, and structured mechanisms to expand the scope and value of existing client relationships?",
     "criteria": {
      "0": "No formal client relationship management; interactions are reactive and transactional.",
      "1": "Partners maintain informal contact with clients; no structured process.",
      "2": "Periodic client reviews happen; no account growth plans or satisfaction measurement.",
      "3": "Formal client review meetings held quarterly; satisfaction surveys conducted; some account expansion plans in place.",
      "4": "A comprehensive CRM programme: quarterly business reviews with all international clients, NPS tracking, account growth plans for each client, documented upsell/cross-sell opportunities, and a measurable client revenue expansion rate (target: 15%+ per year from existing clients)."
     },
     "guidance": {
      "1": "Implement a formal Quarterly Business Review (QBR) process for every international client. A QBR is a structured 45–60 minute meeting covering: (a) Review of work delivered, (b) Client satisfaction, (c) Upcoming needs, (d) Relationship health, (e) Opportunities for expanded scope. Use a standard agenda template.",
